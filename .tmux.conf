# ─────────────────────────────────────────────
# 🎨 APPEARANCE
# ─────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ',xterm-256color:Tc'

# Pane borders
set -g pane-border-style fg=colour236
set -g pane-active-border-style fg=colour39,bold
set -g pane-border-lines heavy

# Pane labels (shows pane number + running command)
set -g pane-border-status top
set -g pane-border-format '#[align=left]#[fg=colour16,bg=#{?pane_active,colour39,colour236},bold] #P: #{pane_current_command} #[default]'

set -g display-panes-time 2000
set -g display-panes-active-colour colour39
set -g display-panes-colour colour236

# ─────────────────────────────────────────────
# 📊 ZELLIJ-STYLE STATUS BAR WITH SHORTCUTS
# ─────────────────────────────────────────────
set -g status-position top
set -g status-style bg=colour235,fg=colour244
set -g status-left '#[fg=colour16,bg=colour39,bold] #S #[fg=colour39,bg=colour235] '
set -g status-left-length 20
set -g status-right ''
set -g status-right-length 0

setw -g window-status-current-format '#[bg=colour39,fg=colour16,bold] #I:#W '
setw -g window-status-format '#[fg=colour244,bg=colour235] #I:#W '

set -g status 2
set -g status-format[1] '#[bg=colour233,fg=colour39,bold] <C-b>t #[fg=colour244,nobold]New Tab #[fg=colour236]│ #[fg=colour39,bold]<C-b>| #[fg=colour244,nobold]V-Split #[fg=colour236]│ #[fg=colour39,bold]<C-b>- #[fg=colour244,nobold]H-Split #[fg=colour236]│ #[fg=colour39,bold]<C-b>x #[fg=colour244,nobold]Close #[fg=colour236]│ #[fg=colour39,bold]Shift+←/→ #[fg=colour244,nobold]Switch Tab #[fg=colour236]│ #[fg=colour39,bold]<C-b>s #[fg=colour244,nobold]Sessions #[fg=colour236]│ #[fg=colour39,bold]<C-b>z #[fg=colour244,nobold]Zoom #[fg=colour236]│ #[fg=colour39,bold]<C-b>d #[fg=colour244,nobold]Detach #[fg=colour236]│ #[fg=colour39,bold]<C-b>h #[fg=colour244,nobold]Help'

# ─────────────────────────────────────────────
# 🖱️ MOUSE & SCROLL
# ─────────────────────────────────────────────
set -g mouse on
set -g set-clipboard on
set -g history-limit 50000

# Vi copy-mode bindings (OSC 52 sends to your Mac clipboard over SSH)
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi WheelUpPane send-keys -X scroll-up
bind -T copy-mode-vi WheelDownPane send-keys -X scroll-down

# Forward scroll to vim/emacs; otherwise enter copy-mode
bind -T root WheelUpPane if-shell -F "#{alternate_on}" "send-keys -M" "select-pane -t= ; copy-mode -e ; send-keys -M"
bind -T root WheelDownPane if-shell -F "#{alternate_on}" "send-keys -M" "select-pane -t= ; send-keys -M"

# ─────────────────────────────────────────────
# ⌨️ USABILITY
# ─────────────────────────────────────────────
setw -g mode-keys vi
set -sg escape-time 10
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

bind t new-window -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Switch windows with Shift+Arrow (no prefix needed)
bind -n S-Left  previous-window
bind -n S-Right next-window

bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"
bind h display-popup -w 56 -h 42 -E "cat ~/.tmux-cheatsheet.txt && read -n 1"
